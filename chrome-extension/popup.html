<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docs Drip Typing</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <section class="popup-card">
        <h1>Google Docs Drip Typing</h1>
        <p class="popup-subtle">Paste text, choose a total duration, and type it into the active Google Doc.</p>

        <label class="popup-label" for="drip-text">Text</label>
        <textarea id="drip-text" class="popup-textarea" placeholder="Paste the text you want to drip type into Google Docs."></textarea>

        <div class="popup-duration-row">
          <div>
            <label class="popup-label" for="minutes">Minutes</label>
            <input id="minutes" class="popup-input" type="number" min="0" value="1" />
          </div>
          <div>
            <label class="popup-label" for="seconds">Seconds</label>
            <input id="seconds" class="popup-input" type="number" min="0" max="59" value="0" />
          </div>
        </div>

        <div class="popup-actions">
          <button id="start-btn" class="popup-button primary" type="button">Arm and start</button>
          <button id="stop-btn" class="popup-button secondary" type="button">Stop</button>
        </div>

        <p id="status" class="popup-status">Ready.</p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
